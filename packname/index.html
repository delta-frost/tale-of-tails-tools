<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack Name Generator – Tale of Tails Tools</title>
  <link rel="stylesheet" href="/tale-of-tails-tools/css/style.css">
  <link rel="icon" type="image/webp" href="/tale-of-tails-tools/assets/icons/wolfpaw.webp">
</head>
<body>
  <div class="container">
    <!-- Theme picker (same across all pages) -->
    <div class="theme-picker">
      <img id="currentPackIcon" src="/tale-of-tails-tools/assets/icons/erroa.webp" alt="Erroa Pack" class="theme-icon-small">
      <label for="themeSelect">Pack Theme:</label>
      <select id="themeSelect" name="themeSelect">
        <option value="theme-erroa">Erroa</option>
        <option value="theme-gwanwyn">Gwanwyn</option>
        <option value="theme-tonnau">Tonnau</option>
      </select>
    </div>

    <!-- Header with logo + dynamic title -->
    <div class="header">
      <div class="wolf-logo">
        <a href="/tale-of-tails-tools/"><img src="/tale-of-tails-tools/assets/icons/static-logo.png" style="width:30%;" alt="Logo"></a>
      </div>
      <h1>Pack Name Generator</h1>
    </div>

    <!-- Unique page content injected below -->
    <div id="generatorOutput" style="text-align: center; margin: 2rem 0;">
  <p style="font-style: italic; color: var(--text-secondary);">
    Your generated pack name will appear here.
  </p>
</div>

<div class="btn-group">
  <button id="generateBtn">
    <img src="/tale-of-tails-tools/assets/icons/packlead.webp" alt="" class="btn-icon"> Generate Name
  </button>
</div>

<div class="notes">
  <strong>Notes</strong>
  <p>
    - All names are based in Welsh, which is where the 'meaning' comes from. Please feel free to point out any translation errors!
  </p>
  <p>
    - Titles are generated separately from names.
  </p>
</div>

<script src="/tale-of-tails-tools/scripts/packname.js"></script>

  </div>

  <!--
  ===== FOOTER PLACEHOLDER =====
  Uncomment and fill with your links when ready.
  You can also move this inside the .container div if you prefer.
  <footer>

      <a href="https://discord.gg/kAu4btGGDJ">Discord</a> •
      Contact Saturday: <a href="mailto:you@example.com">email</a>
    </p>
  </footer>
  -->

  <!-- Load the theme switcher on every page -->
  <script src="/tale-of-tails-tools/scripts/theme.js"></script>
</body>
</html>
