<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Mood Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1c29;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    .container {
      background: #2a2d3e;
      padding: 2rem 2.5rem;
      border-radius: 2rem;
      box-shadow: 0 0 30px rgba(100, 100, 255, 0.25);
      max-width: 500px;
      width: 100%;
      text-align: left;
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .wolf-emoji {
      font-size: 3rem;
    }
    h1 {
      font-size: 2rem;
      margin: 0.3rem 0;
    }
    #introText {
      font-size: 1.2rem;
      margin: 1.5rem 0 0.5rem;
      color: #bbb;
    }
    #moodName {
      font-size: 2.8rem;
      margin: 0.2rem 0 1rem;
      color: #c9b1ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .effects {
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem;
    }
    .effects li {
      margin: 0.4rem 0;
      font-size: 1.1rem;
      padding-left: 1.2rem;
      text-indent: -1.2rem;
    }
    .effects li.positive::before {
      content: "+ ";
      color: #7ecd7e;
      font-weight: bold;
    }
    .effects li.negative::before {
      content: "− ";
      color: #e07b7b;
      font-weight: bold;
    }
    .btn-group {
      text-align: center;
      margin: 1.5rem 0 1rem;
    }
    button {
      background: #5e4b8b;
      border: none;
      color: white;
      font-size: 1rem;
      padding: 0.7rem 1.8rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.2s;
      margin: 0.3rem;
    }
    button:hover {
      background: #7a62a8;
    }
    button.secondary {
      background: #3b4d61;
    }
    .notes {
      margin-top: 2rem;
      padding: 1rem 1.2rem;
      background: #222433;
      border-left: 4px solid #7a62a8;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      color: #bbb;
      line-height: 1.6;
    }
    .notes strong {
      color: #ddd;
    }
    .notes p {
      margin: 0.3rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="wolf-emoji">🐺</div>
      <h1>Wolf Mood</h1>
    </div>

    <!-- Generated mood output -->
    <div id="introText">Your wolf is feeling…</div>
    <h2 id="moodName">—</h2>
    <ul id="effectsList" class="effects"></ul>

    <div class="btn-group">
      <button onclick="generateMood()">🌿 New Mood</button>
      <button class="secondary" onclick="generateMoonMood()">🌙 Moon Mood</button>
    </div>

    <!-- Player notes at the bottom -->
    <div class="notes">
      <strong>Notes</strong>
      <p>
        - You are encouraged take your wolf’s personality into account — e.g. a cowardly wolf in a “Daring” mood may have a much lower bar for what counts as daring.
      </p>
    </div>
  </div>

  <script>
    /*
      MOOD DATA — Add or edit moods below.
      Each mood has:
        name   – the mood title (shown in <h2>)
        plus   – array of positive behaviour strings
        minus  – array of negative/avoidant behaviour strings
    */
    const standardMoods = [
      {
        name: "Daring",
        plus: [
          "More likely to get into fights",
          "More likely to claim territory"
        ],
        minus: [
          "Less likely to flee",
          "Less likely to give up on hunts"
        ]
      },
      {
        name: "Cautious",
        plus: [
          "More likely to avoid open ground",
          "More likely to seek high vantage points"
        ],
        minus: [
          "Less likely to start a fight",
          "Less likely to enter unknown dens"
        ]
      },
      {
        name: "Playful",
        plus: [
          "More likely to initiate chase-games",
          "More likely to tease packmates"
        ],
        minus: [
          "Less likely to remain still or silent",
          "Less likely to take threats seriously at first"
        ]
      },
      {
        name: "Sullen",
        plus: [
          "More likely to howl mournfully",
          "More likely to wander alone"
        ],
        minus: [
          "Less likely to respond to pack calls",
          "Less likely to share food"
        ]
      },
      {
        name: "Protective",
        plus: [
          "More likely to guard the den",
          "More likely to place themselves between danger and pack"
        ],
        minus: [
          "Less likely to retreat",
          "Less likely to ignore an intruder"
        ]
      }
    ];

    // Optional moon‑touched moods — works the same way
    const moonMoods = [
      {
        name: "Lunatic Frenzy",
        plus: [
          "More likely to attack without warning",
          "More likely to chase prey far beyond normal range"
        ],
        minus: [
          "Less likely to recognise friend from foe",
          "Less likely to control the shift (if a werewolf)"
        ]
      },
      {
        name: "Moon‑Blessed Calm",
        plus: [
          "More likely to heal quickly",
          "More likely to sense spirits"
        ],
        minus: [
          "Less likely to act aggressively",
          "Less likely to be affected by fear effects"
        ]
      },
      {
        name: "Haunted",
        plus: [
          "More likely to see omens",
          "More likely to talk to long‑gone packmates"
        ],
        minus: [
          "Less likely to sleep soundly",
          "Less likely to trust the present"
        ]
      }
    ];

    // Random array picker
    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // Render a mood object into the page
    function displayMood(moodObj) {
      document.getElementById('introText').textContent = "Your wolf is feeling…";
      document.getElementById('moodName').textContent = moodObj.name;
      const list = document.getElementById('effectsList');
      list.innerHTML = ''; // clear previous

      // Add positive effects
      moodObj.plus.forEach(effect => {
        const li = document.createElement('li');
        li.className = 'positive';
        li.textContent = effect;
        list.appendChild(li);
      });

      // Add negative effects
      moodObj.minus.forEach(effect => {
        const li = document.createElement('li');
        li.className = 'negative';
        li.textContent = effect;
        list.appendChild(li);
      });
    }

    // Standard mood generation
    function generateMood() {
      const mood = randomItem(standardMoods);
      displayMood(mood);
    }

    // Moon mood generation (picks from moonMoods)
    function generateMoonMood() {
      const mood = randomItem(moonMoods);
      displayMood(mood);
    }

    // Load a random standard mood on page load
    window.onload = generateMood;
  </script>
</body>
</html>
