<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Trait Generator – Tale of Tails Tools</title>
  <link rel="stylesheet" href="/tale-of-tails-tools/css/style.css">
  <link rel="icon" type="image/webp" href="/tale-of-tails-tools/assets/icons/wolfpaw.webp">
<script>
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.className = saved;
    } else {
      document.documentElement.className = 'theme-erroa';
    }
  })();
</script>
</head>
<body>
  <div class="container">
    <!-- Theme picker (same across all pages) -->
<div class="theme-picker"
     x-data="{
         theme: localStorage.getItem('theme') || 'theme-erroa',
         icons: {
             'theme-erroa': '/tale-of-tails-tools/assets/icons/erroa.webp',
             'theme-gwanwyn': '/tale-of-tails-tools/assets/icons/gwanwyn.webp',
             'theme-tonnau': '/tale-of-tails-tools/assets/icons/tonnau.webp'
         },
         init() {
             document.documentElement.className = this.theme;
         },
         switchTheme(newTheme) {
             this.theme = newTheme;
             document.documentElement.className = newTheme;
             localStorage.setItem('theme', newTheme);
         }
     }">
    <label for="themeSelect">Theme:</label>
    <select id="themeSelect"
            x-model="theme"
            @change="switchTheme($el.value)">
        <option value="theme-erroa">
            <img src="/tale-of-tails-tools/assets/icons/erroa.webp" alt="" class="theme-icon-small"> Erroa
        </option>
        <option value="theme-gwanwyn">
            <img src="/tale-of-tails-tools/assets/icons/gwanwyn.webp" alt="" class="theme-icon-small"> Gwanwyn
        </option>
        <option value="theme-tonnau">
            <img src="/tale-of-tails-tools/assets/icons/tonnau.webp" alt="" class="theme-icon-small"> Tonnau
        </option>
    </select>

    <!-- Optional pack icon – only if you have <img id="currentPackIcon"> somewhere -->
    <img id="currentPackIcon"
         :src="icons[theme]"
         alt="Pack icon"
         style="width: 1.6rem; height: 1.6rem; vertical-align: middle; margin-left: 0.5rem;" />
</div>

    <!-- Header with logo + dynamic title -->
    <div class="header">
      <div class="wolf-logo">
        <a href="/tale-of-tails-tools/"><img src="/tale-of-tails-tools/assets/icons/static-logo.png" style="width:30%;" alt="Logo"></a>
      </div>
      <h1>Wolf Trait Generator</h1>
    </div>

    <!-- Unique page content injected below -->
    
<div id="traitsOutput" class="traits-grid" aria-live="polite">
  <div class="trait-card positive" data-category="positive" title="Click to re‑roll">
    <span class="trait-label">Positive</span>
    <span class="trait-value" id="positiveTrait">—</span>
  </div>
  <div class="trait-card neutral" data-category="neutral" title="Click to re‑roll">
    <span class="trait-label">Neutral</span>
    <span class="trait-value" id="neutralTrait">—</span>
  </div>
  <div class="trait-card negative" data-category="negative" title="Click to re‑roll">
    <span class="trait-label">Negative</span>
    <span class="trait-value" id="negativeTrait">—</span>
  </div>
</div>


<div class="btn-group">
  <button id="generateTraitsBtn">
    <img src="/tale-of-tails-tools/assets/icons/wolfpaw.webp" alt="" class="btn-icon"> Generate Traits
  </button>
  
  <button
    x-data="{ copied: false }"
    @click="
      const text = 
        '+ ' + document.getElementById('positiveTrait').textContent +
        ' | = ' + document.getElementById('neutralTrait').textContent +
        ' | - ' + document.getElementById('negativeTrait').textContent;
      navigator.clipboard.writeText(text).then(() => {
        copied = true;
        setTimeout(() => copied = false, 1500);
      });
    "
    class="secondary"
    aria-label="Copy traits to clipboard"
  >
    <img src="/tale-of-tails-tools/assets/icons/pencil.webp" alt="" class="btn-icon">
    <span x-text="copied ? '✓ Copied!' : 'Copy Traits'"></span>
  </button>
</div>

<div class="notes">
  <strong>Notes</strong>
	<p>- You can click on any trait to re-generate it separately from the rest.</p>
	<p>- 'Human'-ish traits have been manually filtered out, if you spot one that doesn't make sense, let us know!</p>
</div>

<script src="/tale-of-tails-tools/scripts/traits.js"></script>

  </div>

  <!--
  ===== FOOTER PLACEHOLDER =====
  Uncomment and fill with your links when ready.
  You can also move this inside the .container div if you prefer.
  <footer>
    <p style="font-size: 0.8rem; text-align: center; margin-top: 2rem;">
      <a href="/about">About</a> •
      <a href="/credits">Credits</a> •
      <a href="https://discord.gg/kAu4btGGDJ">Discord</a> •
      Contact Saturday: <a href="mailto:you@example.com">email</a>
    </p>
  </footer>
  -->
	<!-- Give JavaScript the site base URL (works with any pathPrefix) -->
	<script>window.siteBase = "/tale-of-tails-tools/";</script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
	<!-- Animated Logo script -->
	<script>
  (function() {
    const logoImg = document.querySelector('.wolf-logo img');
    if (!logoImg) return;
    const staticSrc = logoImg.src;
    const animatedSrc = '/tale-of-tails-tools/assets/icons/logo.webp';  // adjust if different
    logoImg.addEventListener('mouseenter', () => { logoImg.src = animatedSrc; });
    logoImg.addEventListener('mouseleave', () => { logoImg.src = staticSrc; });
  })();
</script>
</body>
</html>
